version: 2

builds:
  - id: imprint
    main: ./cmd/imprint
    binary: imprint
    env:
      - CGO_ENABLED=1
      # Match CI / Dockerfile: quoted #include "usearch.h" needs explicit include path
      - CGO_CFLAGS=-I/usr/local/include
      - CGO_LDFLAGS=-L/usr/local/lib -lusearch_c
    flags:
      - -tags=sqlite_fts5
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
