version: 2

builds:
  - id: imprint
    main: ./cmd/imprint
    binary: imprint
    env:
      - CGO_ENABLED=1
      - CGO_LDFLAGS=-lusearch_c
    flags:
      - -tags=sqlite_fts5
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
