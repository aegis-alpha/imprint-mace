name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        # macOS temporarily disabled: USearch CGO pointer panics with Go 1.26 on ARM64
        # os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build USearch C library from source (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ cmake git
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch v2.24.0 https://github.com/unum-cloud/usearch.git /tmp/usearch
          cd /tmp/usearch
          cmake -B build_release \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSEARCH_BUILD_LIB_C=ON \
            -DUSEARCH_BUILD_TEST_C=OFF \
            -DUSEARCH_BUILD_BENCH_CPP=OFF \
            -DUSEARCH_BUILD_TEST_CPP=OFF
          cmake --build build_release --config Release -j$(nproc)
          sudo cp build_release/libusearch_c.so /usr/local/lib/
          sudo cp c/usearch.h /usr/local/include/
          sudo ldconfig

      - name: Install USearch C library (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then ZIP=usearch_macos_arm64_2.24.0.zip; else ZIP=usearch_macos_x86_64_2.24.0.zip; fi
          wget -q "https://github.com/unum-cloud/USearch/releases/download/v2.24.0/$ZIP"
          unzip -o "$ZIP"
          sudo mkdir -p /usr/local/lib /usr/local/include
          sudo cp build_release/libusearch_c.dylib /usr/local/lib/
          sudo cp c/usearch.h /usr/local/include/
          echo "CGO_LDFLAGS=-L/usr/local/lib -lusearch_c" >> "$GITHUB_ENV"

      # Lint temporarily disabled for v0.5.0 release
      # golangci-lint typecheck fails with USearch CGO on GitHub runners
      # TODO: fix after v0.5.0 release
      # - name: Lint
      #   if: runner.os == 'Linux'
      #   run: |
      #     export CGO_ENABLED=1
      #     export CGO_LDFLAGS=-lusearch_c
      #     curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.3
      #     $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Test with coverage
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I/usr/local/include
          CGO_LDFLAGS: -L/usr/local/lib -lusearch_c
          IMPRINT_SKIP_USEARCH: "1"
        run: |
          go test -tags sqlite_fts5 -race -timeout 10m -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Vet
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I/usr/local/include
          CGO_LDFLAGS: -L/usr/local/lib -lusearch_c
        run: go vet -tags sqlite_fts5 ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I/usr/local/include
          CGO_LDFLAGS: -L/usr/local/lib -lusearch_c
        run: go build -tags sqlite_fts5 -o imprint ./cmd/imprint

      - name: Retrieval eval
        run: ./imprint eval-retrieval --no-embedder --format=table

      - name: PII check
        run: |
          if grep -rn "boris\|verbitsky\|kevin" --include="*.go" --include="*.md" --include="*.py" --include="*.sh" --include="*.toml" --include="*.mjs" --exclude-dir=.github --exclude-dir=archive --exclude-dir=prompts . ; then
            echo "::error::PII detected in source files"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build USearch C library from source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ cmake git
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch v2.24.0 https://github.com/unum-cloud/usearch.git /tmp/usearch
          cd /tmp/usearch
          cmake -B build_release \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSEARCH_BUILD_LIB_C=ON \
            -DUSEARCH_BUILD_TEST_C=OFF \
            -DUSEARCH_BUILD_BENCH_CPP=OFF \
            -DUSEARCH_BUILD_TEST_CPP=OFF
          cmake --build build_release --config Release -j$(nproc)
          sudo cp build_release/libusearch_c.so /usr/local/lib/
          sudo cp c/usearch.h /usr/local/include/
          sudo ldconfig

      - name: Vulnerability check
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I/usr/local/include
          CGO_LDFLAGS: -L/usr/local/lib -lusearch_c
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Secret scan
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          extra_args: --only-verified

  integration:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build USearch C library from source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ cmake git
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch v2.24.0 https://github.com/unum-cloud/usearch.git /tmp/usearch
          cd /tmp/usearch
          cmake -B build_release \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSEARCH_BUILD_LIB_C=ON \
            -DUSEARCH_BUILD_TEST_C=OFF \
            -DUSEARCH_BUILD_BENCH_CPP=OFF \
            -DUSEARCH_BUILD_TEST_CPP=OFF
          cmake --build build_release --config Release -j$(nproc)
          sudo cp build_release/libusearch_c.so /usr/local/lib/
          sudo cp c/usearch.h /usr/local/include/
          sudo ldconfig

      - name: Integration tests
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I/usr/local/include
          CGO_LDFLAGS: -L/usr/local/lib -lusearch_c
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          go test -tags 'sqlite_fts5 integration' -timeout 120s -count=1 -v ./internal/...

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/aegis-alpha/imprint-mace:main
            ghcr.io/aegis-alpha/imprint-mace:${{ github.sha }}
