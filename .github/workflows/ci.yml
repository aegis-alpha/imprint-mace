name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m

      - name: Test with coverage
        run: |
          CGO_ENABLED=1 go test -tags sqlite_fts5 -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Vet
        run: CGO_ENABLED=1 go vet -tags sqlite_fts5 ./...

      - name: Build
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -o imprint ./cmd/imprint

      - name: Retrieval eval
        run: ./imprint eval-retrieval --no-embedder --format=table

      - name: PII check
        run: |
          if grep -rn "boris\|verbitsky\|kevin" --include="*.go" --include="*.md" --include="*.py" --include="*.sh" --include="*.toml" --include="*.mjs" --exclude-dir=.github --exclude-dir=archive --exclude-dir=prompts . ; then
            echo "::error::PII detected in source files"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Secret scan
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          extra_args: --only-verified

  integration:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          CGO_ENABLED=1 go test -tags 'sqlite_fts5 integration' -timeout 120s -count=1 -v ./internal/...

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/aegis-alpha/imprint-mace:main
            ghcr.io/aegis-alpha/imprint-mace:${{ github.sha }}
