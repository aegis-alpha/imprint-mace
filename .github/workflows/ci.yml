name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: CGO_ENABLED=1 go test -tags sqlite_fts5 -race ./...
      - name: Vet
        run: CGO_ENABLED=1 go vet -tags sqlite_fts5 ./...
      - name: Build
        run: CGO_ENABLED=1 go build -tags sqlite_fts5 -o /dev/null ./cmd/imprint
      - name: PII check
        run: |
          if grep -rn "boris\|verbitsky\|kevin" --include="*.go" --include="*.md" --include="*.py" --include="*.sh" --include="*.toml" --include="*.mjs" --exclude-dir=.github --exclude-dir=archive --exclude-dir=prompts . ; then
            echo "::error::PII detected in source files"
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/aegis-alpha/imprint-mace:main
