name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Install USearch C library
        run: |
          wget -q https://github.com/unum-cloud/USearch/releases/download/v2.24.0/usearch_linux_amd64_2.24.0.deb
          sudo dpkg -i usearch_linux_amd64_2.24.0.deb || sudo apt-get install -f -y
      
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-I/usr/include"
          CGO_LDFLAGS: "-L/usr/lib -lusearch_c"

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/aegis-alpha/imprint-mace:${{ github.ref_name }},ghcr.io/aegis-alpha/imprint-mace:latest
