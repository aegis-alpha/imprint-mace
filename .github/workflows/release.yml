name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Install build deps and build USearch from source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ cmake git libsqlite3-dev
          git clone --depth 1 --recurse-submodules --shallow-submodules --branch v2.24.0 https://github.com/unum-cloud/usearch.git /tmp/usearch
          cd /tmp/usearch
          cmake -B build_release \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSEARCH_BUILD_LIB_C=ON \
            -DUSEARCH_BUILD_TEST_C=OFF \
            -DUSEARCH_BUILD_BENCH_CPP=OFF \
            -DUSEARCH_BUILD_TEST_CPP=OFF
          cmake --build build_release --config Release -j$(nproc)
          sudo cp build_release/libusearch_c.so /usr/local/lib/
          sudo cp c/usearch.h /usr/local/include/
          sudo ldconfig
      
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          build-args: |
            IMPRINT_VERSION=${{ github.ref_name }}
          tags: ghcr.io/aegis-alpha/imprint-mace:${{ github.ref_name }},ghcr.io/aegis-alpha/imprint-mace:latest
